<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MC Flat Bedrock World</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js';

let scene, camera, renderer;
const blockSize = 1;
const chunkSize = 10; // 10x10 blocks
const loadedChunks = new Map(); // store chunks by "x_z" key

init();
animate();

function init() {
    // Scene & Background
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    // Camera
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 20, 0);
    camera.lookAt(0, 0, 0);

    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Light
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);

    // Keyboard controls
    window.addEventListener('keydown', moveCamera);

    // Initial chunks
    updateChunks();
}

// Generate a chunk at chunk coordinates (cx, cz)
function generateChunk(cx, cz) {
    const chunkKey = `${cx}_${cz}`;
    if (loadedChunks.has(chunkKey)) return;

    const bedrockMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const grassMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
    const geometry = new THREE.BoxGeometry(blockSize, blockSize, blockSize);

    for (let x = 0; x < chunkSize; x++) {
        for (let z = 0; z < chunkSize; z++) {
            const worldX = cx * chunkSize + x;
            const worldZ = cz * chunkSize + z;

            // Bedrock
            let bedrockBlock = new THREE.Mesh(geometry, bedrockMaterial);
            bedrockBlock.position.set(worldX, 0, worldZ);
            scene.add(bedrockBlock);

            // Grass
            let grassBlock = new THREE.Mesh(geometry, grassMaterial);
            grassBlock.position.set(worldX, 1, worldZ);
            scene.add(grassBlock);
        }
    }

    loadedChunks.set(chunkKey, true);
}

// Load chunks around camera
function updateChunks() {
    const camX = Math.floor(camera.position.x / chunkSize);
    const camZ = Math.floor(camera.position.z / chunkSize);

    for (let dx = -2; dx <= 2; dx++) {
        for (let dz = -2; dz <= 2; dz++) {
            generateChunk(camX + dx, camZ + dz);
        }
    }
}

// Camera movement
const step = 5; // faster movement
function moveCamera(event) {
    switch(event.key) {
        case 'w': camera.position.z -= step; break;
        case 's': camera.position.z += step; break;
        case 'a': camera.position.x -= step; break;
        case 'd': camera.position.x += step; break;
    }
}

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    updateChunks();
    renderer.render(scene, camera);
}

// Handle window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
