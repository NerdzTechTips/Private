<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craftd.io</title>
  <link rel="stylesheet" href="styles/index.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-container">
    <img src="textures/logo.png" class="logo">
    <div class="logo-text">Craftd.io</div>
  </div>
</div>
<div class="game-cards">

<a href="games/survival.html" class="card-link">
  <div class="card">
    <div class="thumb">
      <img src="textures/survival.png" alt="Survival Mode">
    </div>
    <div class="card-title"><b>Survival</b></div>
  </div>
</a>

  
  <div class="card">
    <div class="thumb">
      <img src="textures/peaceful.png" alt="Peaceful Mode">
    </div>
    <div class="card-title"><b>Peaceful</b></div>
  </div>

  <div class="card">
    <div class="thumb">
      <img src="textures/creative.png" alt="Creative Mode">
    </div>
    <div class="card-title"><b>Creative</b></div>
  </div>
</div>
</body>
<script id="disableRightClick">
document.addEventListener("contextmenu", function (e) {
  e.preventDefault();
});
</script>
<Script src="js/MAIN.JS"></Script>
</html>
